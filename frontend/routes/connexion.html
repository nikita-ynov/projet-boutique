<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZAZA — Connexion</title>

    <link rel="stylesheet" href="../css/main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        .login-container {
            width: 100%;
            max-width: 400px;
            margin: 60px auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .login-container h1 {
            font-size: 24px;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .form-group input:focus {
            border-color: #2563eb;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #111827;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s ease;
        }

        .btn-submit:hover {
            background: #2563eb;
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #6b7280;
        }

        .login-footer a {
            color: #2563eb;
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="site-header">
        <div class="container header-bar">
            <nav class="nav-links" aria-label="Navigation principale">
        <a href="../index.html">Accueil</a>          <!-- remonte d'un dossier -->
<a href="./admin.html">Gérer le site</a>      <!-- même dossier -->
<a href="./connexion.html">Me connecter</a>   <!-- même dossier -->
            </nav>

            <a href="../" class="brand" aria-label="ZAZA - Accueil">
                <img src="../img/logo.png" class="brand-logo" alt="" aria-hidden="true">
            </a>

            <div class="header-actions">
                <button class="btn ghost" aria-label="Favoris">❤</button>
                <button class="btn">🛒 Panier</button>
            </div>
        </div>
    </header>

    <!-- CONNEXION FORM -->
    <main>
        <div class="login-container">
            <h1>Connexion</h1>

            <form>
                <div class="form-group">
                    <label for="email">Adresse e-mail</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="btn-submit">Se connecter</button>
            </form>

            <div class="login-footer">
                <p>Pas encore inscrit ? <a href="inscription.html">S'inscrire</a></p>
                <p><a href="#">Mot de passe oublié ?</a></p>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 ZAZA — Tous droits réservés.</p>
        </div>
    </footer>

    <script src="../script/app.js"></script>

</body>
</html>
